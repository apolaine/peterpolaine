<dialog class="quickview" id="quickview" aria-label="Artwork quick view">
  <button class="quickview__close" type="button" aria-label="Close">
    <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 3l10 10M13 3L3 13"/></svg>
  </button>
  <div class="quickview__inner">
    <div class="quickview__image-wrap">
      <img class="quickview__image" src="" alt="" loading="lazy">
    </div>
    <div class="quickview__details">
      <a class="quickview__section-link" href="#"></a>
      <h2 class="quickview__title"></h2>
      <dl class="quickview__meta">
        <dt>Medium</dt>    <dd data-qv="medium"></dd>
        <dt>Dimensions</dt><dd data-qv="dimensions"></dd>
        <dt>Year</dt>      <dd data-qv="year"></dd>
        <dt>Edition</dt>   <dd data-qv="edition"></dd>
      </dl>
      <p class="quickview__price"></p>
      <a class="quickview__full-link" href="#">View full details</a>
    </div>
  </div>
</dialog>
